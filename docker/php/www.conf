[www]
user = www-data
group = www-data

; Listen on all interfaces so nginx can connect
listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data

; Process manager
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 5

; Capture worker stdout/stderr and forward to php-fpm master stdout
; This makes /dev/stdout work from PHP worker processes
catch_workers_output = yes
decorate_workers_output = no

