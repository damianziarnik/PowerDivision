services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: powerdivision_app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    networks:
      - powerdivision_network
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: powerdivision_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: powerdivision
      POSTGRES_USER: powerdivision
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - powerdivision_network

  redis:
    image: redis:7-alpine
    container_name: powerdivision_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - powerdivision_network

networks:
  powerdivision_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
